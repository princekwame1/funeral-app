; Overrides for PHP-FPM environments (production). Local `php artisan serve`
; ignores this file — see php.ini or start the dev server with:
;   php -d post_max_size=32M -d upload_max_filesize=16M -S 127.0.0.1:8000 -t public
; Values are chosen to comfortably hold four branded images + form fields.
post_max_size = 32M
upload_max_filesize = 16M
memory_limit = 256M
max_input_time = 60
